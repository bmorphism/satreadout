name: proof-health

# Continuous inverter for the SatReadout proof system.
# Per-commit measured trits (assigned trits are decorative; these can FAIL):
#   +1 Play    — all four targets build (lake, mathlib cache)
#    0 Witness — axiom audit: every key theorem on propext/Classical.choice/Quot.sound ONLY
#   −1 Coplay  — the resident falsifier still compiles:
#               no_eps_midpoint_without_quadratic_bound_is_false (Q3 disproof)
#               and zero live sorries anywhere in the build.
# Σ ≡ 0 ⇔ merge-healthy.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: build (+1 Play)
        uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: true
          build-args: "SatReadout AristotleQ1 AristotleQ2 AristotleQ3 ToleranceIntent SatReadoutGeodesic SatReadoutNotGeodesic SatReadoutAtlas"

      - name: no live sorries (−1 Coplay, part 1)
        run: |
          set -euo pipefail
          OUT=$(~/.elan/bin/lake build SatReadout AristotleQ1 AristotleQ2 AristotleQ3 ToleranceIntent SatReadoutGeodesic SatReadoutNotGeodesic SatReadoutAtlas 2>&1 || true)
          echo "$OUT" | tail -5
          if echo "$OUT" | grep -q "uses 'sorry'"; then
            echo "::error::live sorry detected"; exit 1
          fi

      - name: axiom gate (0 Witness)
        run: |
          set -euo pipefail
          ~/.elan/bin/lake env lean axcheck.lean | tee axioms.txt
          # fail on ANY axiom outside the standard three (sorryAx, ofReduceBool, custom…)
          if grep -oE "\[[^]]*\]" axioms.txt | tr -d "[]" | tr "," "\n" | tr -d " " | sort -u \
             | grep -vE "^(propext|Classical\.choice|Quot\.sound)$" | grep -q .; then
            echo "::error::non-standard axiom in dependency closure"; exit 1
          fi
          N=$(grep -c "depends on axioms" axioms.txt)
          if [ "$N" -lt 6 ]; then
            echo "::error::axiom audit covered $N/6 theorems — axcheck.lean drifted"; exit 1
          fi

      - name: falsifier alive (−1 Coplay, part 2)
        run: |
          set -euo pipefail
          grep -q "no_eps_midpoint_without_quadratic_bound_is_false" axioms.txt \
            || { echo "::error::resident falsifier missing from audit"; exit 1; }

      - name: ledger
        run: |
          echo "## proof-health: Σ ≡ 0" >> "$GITHUB_STEP_SUMMARY"
          echo "| trit | gate | status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| +1 | build 4 targets | green |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 0 | axioms = std triple, 17/17 theorems | green |" >> "$GITHUB_STEP_SUMMARY"
          echo "| −1 | falsifier compiles, zero sorries | green |" >> "$GITHUB_STEP_SUMMARY"
